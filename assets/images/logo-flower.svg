<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-labelledby="logo-flower-title">
  <title id="logo-flower-title">Growwise Urban flower</title>

  <defs>
    <radialGradient id="petal-light" cx="38%" cy="30%" r="75%">
      <stop offset="0" stop-color="#F6F2B8"/>
      <stop offset="0.48" stop-color="#B8E986"/>
      <stop offset="1" stop-color="#4F8B5F"/>
    </radialGradient>

    <radialGradient id="petal-deep" cx="42%" cy="32%" r="78%">
      <stop offset="0" stop-color="#DDF3A9"/>
      <stop offset="0.55" stop-color="#77B66B"/>
      <stop offset="1" stop-color="#295D40"/>
    </radialGradient>

    <radialGradient id="flower-center" cx="38%" cy="35%" r="70%">
      <stop offset="0" stop-color="#FFF1A8"/>
      <stop offset="0.5" stop-color="#E7B84D"/>
      <stop offset="1" stop-color="#9B641F"/>
    </radialGradient>

    <linearGradient id="stem-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6CA66F"/>
      <stop offset="0.52" stop-color="#326B49"/>
      <stop offset="1" stop-color="#173D2C"/>
