<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="favicon-title">
  <title id="favicon-title">Growwise Urban</title>

  <defs>
    <linearGradient id="favicon-bg" x1="8" y1="5" x2="57" y2="61">
      <stop offset="0" stop-color="#214C38"/>
      <stop offset="1" stop-color="#090D0B"/>
    </linearGradient>

    <radialGradient id="favicon-petal-light" cx="35%" cy="28%" r="78%">
      <stop offset="0" stop-color="#F1F5BD"/>
      <stop offset="0.48" stop-color="#B8E986"/>
      <stop offset="1" stop-color="#4D8A5E"/>
    </radialGradient>

    <radialGradient id="favicon-petal-deep" cx="38%" cy="30%" r="78%">
      <stop offset="0" stop-color="#DDF3A9"/>
      <stop offset="0.55" stop-color="#77B66B"/>
      <stop offset="1" stop-color="#295D40"/>
    </radialGradient>

    <radialGradient id="favicon-center" cx="36%" cy="32%" r="72%">
      <stop offset="0" stop-color="#FFF2A5"/>
      <stop offset="0.5" stop-color="#E7B84D"/>
      <stop offset="1" stop-color="#915A1E"/>
    </radialGradient>

    <filter id="favicon-shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect
    x="2"
    y="2"
    width="60"
    height="60"
    rx="17"
    fill="url(#favicon-bg)"
  />

  <circle
    cx="32"
    cy="32"
    r="25"
    fill="none"
    stroke="rgba(255,255,255,0.08)"
    stroke-width="1"
  />

  <g filter="url(#favicon-shadow)">
    <ellipse
      cx="32"
      cy="18"
      rx="7"
      ry="12"
      fill="url(#favicon-petal-light)"
    />

    <ellipse
      cx="44"
      cy="25"
      rx="7"
      ry="12"
      fill="url(#favicon-petal-deep)"
      transform="rotate(60 44 25)"
    />

    <ellipse
      cx="44"
      cy="39"
      rx="7"
      ry="12"
      fill="url(#favicon-petal-light)"
      transform="rotate(120 44 39)"
    />

    <ellipse
      cx="32"
      cy="46"
      rx="7"
      ry="12"
      fill="url(#favicon-petal-deep)"
      transform="rotate(180 32 46)"
    />

    <ellipse
      cx="20"
      cy="39"
      rx="7"
      ry="12"
      fill="url(#favicon-petal-light)"
      transform="rotate(240 20 39)"
    />

    <ellipse
      cx="20"
      cy="25"
      rx="7"
      ry="12"
      fill="url(#favicon-petal-deep)"
      transform="rotate(300 20 25)"
    />

    <circle
      cx="32"
      cy="32"
      r="9"
      fill="url(#favicon-center)"
    />

    <circle cx="29" cy="29" r="1.25" fill="#FFF5BE"/>
    <circle cx="35.5" cy="28.5" r="1.1" fill="#F9D66B"/>
    <circle cx="37.5" cy="33" r="1.2" fill="#A86520"/>
    <circle cx="32" cy="35.5" r="1.3" fill="#F4CA57"/>
    <circle cx="27.5" cy="34" r="1.1" fill="#A3611E"/>
    <circle cx="32" cy="32" r="1.8" fill="#754313"/>
  </g>
</svg>